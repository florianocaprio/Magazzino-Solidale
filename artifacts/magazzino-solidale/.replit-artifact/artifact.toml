kind = "web"
previewPath = "/"
title = "Magazzino Solidale AIM"
version = "1.0.0"
id = "artifacts/magazzino-solidale"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21451

[services.development]
run = "pnpm --filter @workspace/magazzino-solidale run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/magazzino-solidale", "run", "build" ]
publicDir = "artifacts/magazzino-solidale/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21451"
BASE_PATH = "/"
