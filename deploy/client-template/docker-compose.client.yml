name: ${COMPOSE_PROJECT_NAME}

services:
  db:
    image: postgres:16-alpine
    container_name: magazzino-${CLIENT_SLUG}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_ROOT:-/data/magazzino-clienti}/${CLIENT_SLUG}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ${SOURCE_REPO_DIR:?Definire SOURCE_REPO_DIR in .env.docker}
      dockerfile: Dockerfile.api
    platform: linux/amd64
    container_name: magazzino-${CLIENT_SLUG}-api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      PORT: 8080
      NODE_ENV: production
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    volumes:
      - ${DATA_ROOT:-/data/magazzino-clienti}/${CLIENT_SLUG}/uploads:/app/uploads
      - ${DATA_ROOT:-/data/magazzino-clienti}/${CLIENT_SLUG}/exports:/app/exports
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(8080, '127.0.0.1').on('connect', function(){process.exit(0)}).on('error', function(){process.exit(1)})\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: ${SOURCE_REPO_DIR:?Definire SOURCE_REPO_DIR in .env.docker}
      dockerfile: Dockerfile.web
    platform: linux/amd64
    container_name: magazzino-${CLIENT_SLUG}-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_HOST_PORT}:80"
    restart: unless-stopped
