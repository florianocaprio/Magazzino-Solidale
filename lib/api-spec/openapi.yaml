openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Magazzino Solidale AIM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: magazzini
  - name: prodotti
  - name: lotti
  - name: movimenti
  - name: giacenze
  - name: trasferimenti
  - name: scarichi
  - name: fornitori
  - name: approvvigionamenti
  - name: beneficiari
  - name: interventi
  - name: consegne
  - name: bolle
  - name: volontari
  - name: mezzi
  - name: report
  - name: auth
  - name: utenti
  - name: ruoli
  - name: aree

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: KPI summary for dashboard
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/alerts:
    get:
      operationId: getDashboardAlerts
      tags: [dashboard]
      summary: Active alerts (low stock, expiring lots, pending deliveries)
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /dashboard/movimenti-recenti:
    get:
      operationId: getMovimentiRecenti
      tags: [dashboard]
      summary: Recent stock movements for activity feed
      responses:
        "200":
          description: Recent movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovimentoSummary"

  # ─── MAGAZZINI ───────────────────────────────────────────────────────────────
  /magazzini:
    get:
      operationId: listMagazzini
      tags: [magazzini]
      summary: List all warehouses
      responses:
        "200":
          description: List of warehouses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Magazzino"
    post:
      operationId: createMagazzino
      tags: [magazzini]
      summary: Create a warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagazzinoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Magazzino"

  /magazzini/{id}:
    get:
      operationId: getMagazzino
      tags: [magazzini]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Magazzino"
    patch:
      operationId: updateMagazzino
      tags: [magazzini]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagazzinoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Magazzino"
    delete:
      operationId: deleteMagazzino
      tags: [magazzini]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PRODOTTI ────────────────────────────────────────────────────────────────
  /prodotti:
    get:
      operationId: listProdotti
      tags: [prodotti]
      summary: List products
      parameters:
        - name: categoria
          in: query
          schema:
            type: string
        - name: tipo
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prodotto"
    post:
      operationId: createProdotto
      tags: [prodotti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProdottoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prodotto"

  /prodotti/{id}:
    get:
      operationId: getProdotto
      tags: [prodotti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prodotto"
    patch:
      operationId: updateProdotto
      tags: [prodotti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProdottoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prodotto"
    delete:
      operationId: deleteProdotto
      tags: [prodotti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── LOTTI ───────────────────────────────────────────────────────────────────
  /lotti:
    get:
      operationId: listLotti
      tags: [lotti]
      parameters:
        - name: prodottoId
          in: query
          schema:
            type: integer
        - name: magazzinoId
          in: query
          schema:
            type: integer
        - name: inScadenza
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of lots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lotto"
    post:
      operationId: createLotto
      tags: [lotti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LottoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lotto"

  /lotti/{id}:
    get:
      operationId: getLotto
      tags: [lotti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lotto"
    patch:
      operationId: updateLotto
      tags: [lotti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LottoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lotto"

  # ─── MOVIMENTI ───────────────────────────────────────────────────────────────
  /movimenti:
    get:
      operationId: listMovimenti
      tags: [movimenti]
      parameters:
        - name: tipo
          in: query
          schema:
            type: string
        - name: magazzinoId
          in: query
          schema:
            type: integer
        - name: prodottoId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movimento"
    post:
      operationId: createMovimento
      tags: [movimenti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovimentoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movimento"

  # ─── GIACENZE ────────────────────────────────────────────────────────────────
  /giacenze:
    get:
      operationId: listGiacenze
      tags: [giacenze]
      parameters:
        - name: magazzinoId
          in: query
          schema:
            type: integer
        - name: sottoscortaOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Stock levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Giacenza"

  # ─── TRASFERIMENTI ───────────────────────────────────────────────────────────
  /trasferimenti:
    get:
      operationId: listTrasferimenti
      tags: [trasferimenti]
      parameters:
        - name: stato
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of transfers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trasferimento"
    post:
      operationId: createTrasferimento
      tags: [trasferimenti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrasferimentoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trasferimento"

  /trasferimenti/{id}:
    get:
      operationId: getTrasferimento
      tags: [trasferimenti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trasferimento"
    patch:
      operationId: updateTrasferimento
      tags: [trasferimenti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrasferimentoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trasferimento"

  /trasferimenti/{id}/avvia:
    post:
      operationId: avviaTrasferimento
      tags: [trasferimenti]
      summary: Phase 1 - start transfer (deduct from origin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transfer started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trasferimento"

  /trasferimenti/{id}/conferma:
    post:
      operationId: confermaTrasferimento
      tags: [trasferimenti]
      summary: Phase 2 - confirm receipt (add to destination)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfermaRicezione"
      responses:
        "200":
          description: Transfer confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trasferimento"

  /scarichi:
    get:
      operationId: listScarichi
      tags: [scarichi]
      responses:
        "200":
          description: List of warehouse discharges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scarico"
    post:
      operationId: createScarico
      tags: [scarichi]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScaricoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scarico"

  /scarichi/{id}:
    get:
      operationId: getScarico
      tags: [scarichi]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Discharge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scarico"

  # ─── FORNITORI ───────────────────────────────────────────────────────────────
  /fornitori:
    get:
      operationId: listFornitori
      tags: [fornitori]
      parameters:
        - name: centroAscoltoId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fornitore"
    post:
      operationId: createFornitore
      tags: [fornitori]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FornitoreInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fornitore"

  /fornitori/{id}:
    get:
      operationId: getFornitore
      tags: [fornitori]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fornitore"
    patch:
      operationId: updateFornitore
      tags: [fornitori]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FornitoreUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fornitore"
    delete:
      operationId: deleteFornitore
      tags: [fornitori]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── APPROVVIGIONAMENTI ──────────────────────────────────────────────────────
  /approvvigionamenti:
    get:
      operationId: listApprovvigionamenti
      tags: [approvvigionamenti]
      parameters:
        - name: stato
          in: query
          schema:
            type: string
        - name: magazzinoId
          in: query
          schema:
            type: integer
        - name: centroAscoltoId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of procurements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Approvvigionamento"
    post:
      operationId: createApprovvigionamento
      tags: [approvvigionamenti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovvigionamentoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approvvigionamento"

  /approvvigionamenti/{id}:
    get:
      operationId: getApprovvigionamento
      tags: [approvvigionamenti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Procurement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approvvigionamento"
    patch:
      operationId: updateApprovvigionamento
      tags: [approvvigionamenti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovvigionamentoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approvvigionamento"

  /approvvigionamenti/{id}/sottometti:
    post:
      operationId: submitApprovvigionamento
      tags: [approvvigionamenti]
      summary: Submit a draft order (sets stato=sottomesso and emails amministrazione)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approvvigionamento"

  # ─── BENEFICIARI ─────────────────────────────────────────────────────────────
  /beneficiari:
    get:
      operationId: listBeneficiari
      tags: [beneficiari]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: priorita
          in: query
          schema:
            type: string
        - name: domicilio
          in: query
          schema:
            type: boolean
        - name: centroAscoltoId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of beneficiaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Beneficiario"
    post:
      operationId: createBeneficiario
      tags: [beneficiari]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeneficiarioInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Beneficiario"

  /beneficiari/{id}:
    get:
      operationId: getBeneficiario
      tags: [beneficiari]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Beneficiary with family and history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeneficiarioDettaglio"
    patch:
      operationId: updateBeneficiario
      tags: [beneficiari]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeneficiarioUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Beneficiario"
    delete:
      operationId: deleteBeneficiario
      tags: [beneficiari]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /beneficiari/{id}/nucleo:
    get:
      operationId: getNucleoFamiliare
      tags: [beneficiari]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Family members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NucleoFamiliare"
    post:
      operationId: addNucleoFamiliare
      tags: [beneficiari]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NucleoFamiliareInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NucleoFamiliare"

  /beneficiari/{id}/nucleo/{membroId}:
    delete:
      operationId: deleteNucleoFamiliare
      tags: [beneficiari]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: membroId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── INTERVENTI ──────────────────────────────────────────────────────────────
  /interventi:
    get:
      operationId: listInterventi
      tags: [interventi]
      parameters:
        - name: beneficiarioId
          in: query
          schema:
            type: integer
        - name: tipo
          in: query
          schema:
            type: string
        - name: centroAscoltoId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of interventions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Intervento"
    post:
      operationId: createIntervento
      tags: [interventi]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterventoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Intervento"

  /interventi/{id}:
    get:
      operationId: getIntervento
      tags: [interventi]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Intervention
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Intervento"
    patch:
      operationId: updateIntervento
      tags: [interventi]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterventoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Intervento"

  # ─── CONSEGNE ────────────────────────────────────────────────────────────────
  /consegne:
    get:
      operationId: listConsegne
      tags: [consegne]
      parameters:
        - name: stato
          in: query
          schema:
            type: string
        - name: data
          in: query
          schema:
            type: string
        - name: beneficiarioId
          in: query
          schema:
            type: integer
        - name: centroAscoltoId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of deliveries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Consegna"
    post:
      operationId: createConsegna
      tags: [consegne]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsegnaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consegna"

  /consegne/{id}:
    get:
      operationId: getConsegna
      tags: [consegne]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consegna"
    patch:
      operationId: updateConsegna
      tags: [consegne]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsegnaUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
