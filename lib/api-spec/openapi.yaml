# ─── SCHEMAS ──────────────────────────────────────────────────────────────────
components:
  schemas:
    ReportFsePlus:
      type: object
      properties:
        anno:
          type: integer
        pesoTotaleKg:
          type: number
        beneficiariTotali:
          type: integer
        personeTotali:
          type: integer
        prodotti:
          type: array
          items:
            type: object
            properties:
              prodottoId:
                type: integer
              prodottoNome:
                type: string
              unitaMisura:
                type: string
              quantitaTotale:
                type: number
              pesoKg:
                type: number
            required: [prodottoId, prodottoNome, unitaMisura, quantitaTotale, pesoKg]
        persone:
          type: object
          properties:
            maschi:
              type: integer
            femmine:
              type: integer
            ue:
              type: integer
            extraUe:
              type: integer
            maschiAdulti:
              type: integer
            maschiMinori:
              type: integer
            femmineAdulte:
              type: integer
            femmineMinori:
              type: integer
            ueMaschi:
              type: integer
            ueFemmine:
              type: integer
            extraUeMaschi:
              type: integer
            extraUeFemmine:
              type: integer
          required: [maschi, femmine, ue, extraUe, maschiAdulti, maschiMinori, femmineAdulte, femmineMinori, ueMaschi, ueFemmine, extraUeMaschi, extraUeFemmine]
      required: [anno, pesoTotaleKg, beneficiariTotali, personeTotali, prodotti, persone]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Dashboard ───────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      properties:
        totMagazzini:
          type: integer
        totProdotti:
          type: integer
        totBeneficiari:
          type: integer
        totVolontari:
          type: integer
        consegneOggi:
          type: integer
        consegneMese:
          type: integer
        lottiInScadenza:
          type: integer
        prodottiSottoscorta:
          type: integer
        trasferimentiInCorso:
          type: integer
        interventiMese:
          type: integer
      required: [totMagazzini, totProdotti, totBeneficiari, totVolontari, consegneOggi, consegneMese, lottiInScadenza, prodottiSottoscorta, trasferimentiInCorso, interventiMese]

    Alert:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
        livello:
          type: string
        messaggio:
          type: string
        dettaglio:
          type: ["string", "null"]
        data:
          type: string
      required: [id, tipo, livello, messaggio, data]

    MovimentoSummary:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
        tipoDettaglio:
          type: string
        prodottoNome:
          type: string
        magazzinoNome:
          type: string
        quantita:
          type: number
        unitaMisura:
          type: string
        dataMovimento:
          type: string
      required: [id, tipo, tipoDettaglio, prodottoNome, magazzinoNome, quantita, unitaMisura, dataMovimento]

    # ── Magazzini ──────────────────────────────────────────────────────────
    Magazzino:
      type: object
      properties:
        id:
          type: integer
        codice:
          type: string
        nome:
          type: string
        indirizzo:
          type: ["string", "null"]
        comune:
          type: ["string", "null"]
        zona:
          type: ["string", "null"]
        responsabile:
          type: ["string", "null"]
        telefono:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        stato:
          type: string
        note:
          type: ["string", "null"]
        dataCreazione:
          type: string
      required: [id, codice, nome, stato, dataCreazione]

    MagazzinoInput:
      type: object
      properties:
        codice:
          type: string
        nome:
          type: string
        indirizzo:
          type: string
        comune:
          type: string
        zona:
          type: string
        responsabile:
          type: string
        telefono:
          type: string
        email:
          type: string
        stato:
          type: string
        note:
          type: string
      required: [codice, nome]

    MagazzinoUpdate:
      type: object
      properties:
        nome:
          type: string
        indirizzo:
          type: string
        comune:
          type: string
        zona:
          type: string
        responsabile:
          type: string
        telefono:
          type: string
        email:
          type: string
        stato:
          type: string
        note:
          type: string

    # ── Prodotti ───────────────────────────────────────────────────────────
    Prodotto:
      type: object
      properties:
        id:
          type: integer
        codice:
          type: string
        nome:
          type: string
        descrizione:
          type: ["string", "null"]
        tipoProdotto:
          type: string
        unitaMisura:
          type: string
        codiceBarre:
          type: ["string", "null"]
        gestioneLotto:
          type: boolean
        gestioneScadenza:
          type: boolean
        fsePlus:
          type: boolean
        scortaMinima:
          type: number
        scortaConsigliata:
          type: number
        conservazione:
          type: ["string", "null"]
        taglia:
          type: ["string", "null"]
        genere:
          type: ["string", "null"]
        stagione:
          type: ["string", "null"]
        condizione:
          type: ["string", "null"]
        attivo:
          type: boolean
        note:
