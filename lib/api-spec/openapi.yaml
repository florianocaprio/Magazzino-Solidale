      tags: [ruoli]
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ruolo"
    post:
      operationId: createRuolo
      tags: [ruoli]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuoloInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ruolo"

  /ruoli/{id}:
    get:
      operationId: getRuolo
      tags: [ruoli]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ruolo"
    patch:
      operationId: updateRuolo
      tags: [ruoli]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuoloUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ruolo"
    delete:
      operationId: deleteRuolo
      tags: [ruoli]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "409":
          description: Role still assigned to users

  /utenti:
    get:
      operationId: listUtenti
      tags: [utenti]
      parameters:
        - name: cittaId
          in: query
          required: false
          schema:
            type: integer
        - name: matricola
          in: query
          required: false
          schema:
            type: string
        - name: query
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
