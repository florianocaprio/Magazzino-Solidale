openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Magazzino Solidale AIM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: magazzini
  - name: prodotti
  - name: lotti
  - name: movimenti
  - name: giacenze
  - name: trasferimenti
  - name: scarichi
  - name: fornitori
  - name: approvvigionamenti
  - name: beneficiari
  - name: interventi
  - name: consegne
  - name: bolle
  - name: volontari
  - name: mezzi
  - name: approvazioni-logistica
  - name: report
  - name: auth
  - name: utenti
  - name: ruoli
  - name: aree
  - name: citta
  - name: zone-uds
  - name: politiche-credito-solidale
  - name: credito-solidale

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: KPI summary for dashboard
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/alerts:
    get:
      operationId: getDashboardAlerts
      tags: [dashboard]
      summary: Active alerts (low stock, expiring lots, pending deliveries)
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /dashboard/movimenti-recenti:
    get:
      operationId: getMovimentiRecenti
      tags: [dashboard]
      summary: Recent stock movements for activity feed
      responses:
        "200":
          description: Recent movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovimentoSummary"

  # ─── MAGAZZINI ───────────────────────────────────────────────────────────────
  /magazzini:
    get:
      operationId: listMagazzini
      tags: [magazzini]
      summary: List all warehouses
      responses:
        "200":
          description: List of warehouses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Magazzino"
    post:
      operationId: createMagazzino
      tags: [magazzini]
      summary: Create a warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagazzinoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Magazzino"

  /magazzini/{id}:
    get:
      operationId: getMagazzino
      tags: [magazzini]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Magazzino"
    patch:
      operationId: updateMagazzino
      tags: [magazzini]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagazzinoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Magazzino"
    delete:
      operationId: deleteMagazzino
      tags: [magazzini]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PRODOTTI ────────────────────────────────────────────────────────────────
  /prodotti:
    get:
      operationId: listProdotti
      tags: [prodotti]
      summary: List products
      parameters:
        - name: categoria
          in: query
          schema:
            type: string
        - name: tipo
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prodotto"
    post:
      operationId: createProdotto
      tags: [prodotti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProdottoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prodotto"

  /prodotti/bulk:
    post:
      operationId: bulkProdotti
      tags: [prodotti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProdottiBulkInput"
      responses:
        "200":
          description: Bulk import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /prodotti/{id}:
    get:
      operationId: getProdotto
      tags: [prodotti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prodotto"
    patch:
      operationId: updateProdotto
      tags: [prodotti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProdottoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prodotto"
    delete:
      operationId: deleteProdotto
      tags: [prodotti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── LOTTI ───────────────────────────────────────────────────────────────────
  /lotti:
    get:
      operationId: listLotti
      tags: [lotti]
      parameters:
        - name: prodottoId
          in: query
          schema:
            type: integer
        - name: magazzinoId
          in: query
          schema:
            type: integer
        - name: inScadenza
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of lots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lotto"
    post:
      operationId: createLotto
      tags: [lotti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LottoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lotto"

  /lotti/{id}:
    get:
      operationId: getLotto
      tags: [lotti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lotto"
    patch:
      operationId: updateLotto
      tags: [lotti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LottoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lotto"

  # ─── MOVIMENTI ───────────────────────────────────────────────────────────────
  /movimenti:
    get:
      operationId: listMovimenti
      tags: [movimenti]
      parameters:
        - name: tipo
          in: query
          schema:
            type: string
        - name: magazzinoId
          in: query
          schema:
            type: integer
        - name: prodottoId
          in: query
          schema:
            type: integer
        - name: centroAscoltoId
          in: query
          schema:
            type: integer
        - name: da
          in: query
          schema:
            type: string
        - name: a
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movimento"
    post:
      operationId: createMovimento
      tags: [movimenti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovimentoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movimento"

  # ─── GIACENZE ────────────────────────────────────────────────────────────────
  /giacenze:
    get:
      operationId: listGiacenze
      tags: [giacenze]
      parameters:
        - name: magazzinoId
          in: query
          schema:
            type: integer
        - name: sottoscortaOnly
          in: query
          schema:
            type: boolean
        - name: fsePlusOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Stock levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Giacenza"

  # ─── PREPARAZIONE CONSEGNE ───────────────────────────────────────────────────
  /preparazione-consegne:
    get:
      operationId: getPreparazioneConsegne
      tags: [preparazione-consegne]
      summary: Goods to prepare for planned deliveries of a warehouse
      parameters:
        - name: cittaId
          in: query
          schema:
            type: integer
        - name: magazzinoId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Aggregated goods to prepare + included deliveries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparazioneConsegne"

  # ─── TRASFERIMENTI ───────────────────────────────────────────────────────────
  /trasferimenti:
    get:
      operationId: listTrasferimenti
      tags: [trasferimenti]
      parameters:
        - name: stato
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of transfers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trasferimento"
    post:
      operationId: createTrasferimento
      tags: [trasferimenti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrasferimentoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trasferimento"

  /trasferimenti/{id}:
    get:
      operationId: getTrasferimento
      tags: [trasferimenti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trasferimento"
    patch:
      operationId: updateTrasferimento
      tags: [trasferimenti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrasferimentoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trasferimento"

  /trasferimenti/{id}/avvia:
    post:
      operationId: avviaTrasferimento
      tags: [trasferimenti]
      summary: Phase 1 - start transfer (deduct from origin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transfer started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trasferimento"

  /trasferimenti/{id}/conferma:
    post:
      operationId: confermaTrasferimento
      tags: [trasferimenti]
      summary: Phase 2 - confirm receipt (add to destination)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfermaRicezione"
      responses:
        "200":
          description: Transfer confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trasferimento"

  /scarichi:
    get:
      operationId: listScarichi
      tags: [scarichi]
      responses:
        "200":
          description: List of warehouse discharges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scarico"
    post:
      operationId: createScarico
      tags: [scarichi]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScaricoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scarico"

  /scarichi/{id}:
    get:
      operationId: getScarico
      tags: [scarichi]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Discharge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scarico"

  # ─── FORNITORI ───────────────────────────────────────────────────────────────
  /fornitori:
    get:
      operationId: listFornitori
      tags: [fornitori]
      parameters:
        - name: cittaId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fornitore"
    post:
      operationId: createFornitore
      tags: [fornitori]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FornitoreInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fornitore"

  /fornitori/bulk:
    post:
      operationId: bulkFornitori
      tags: [fornitori]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FornitoriBulkInput"
      responses:
        "200":
          description: Bulk import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /fornitori/{id}:
    get:
      operationId: getFornitore
      tags: [fornitori]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fornitore"
    patch:
      operationId: updateFornitore
      tags: [fornitori]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FornitoreUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fornitore"
    delete:
      operationId: deleteFornitore
      tags: [fornitori]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── APPROVVIGIONAMENTI ──────────────────────────────────────────────────────
  /approvvigionamenti:
    get:
      operationId: listApprovvigionamenti
      tags: [approvvigionamenti]
      parameters:
        - name: stato
          in: query
          schema:
            type: string
        - name: magazzinoId
          in: query
          schema:
            type: integer
        - name: centroAscoltoId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of procurements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Approvvigionamento"
    post:
      operationId: createApprovvigionamento
      tags: [approvvigionamenti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovvigionamentoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approvvigionamento"

  /approvvigionamenti/{id}:
    get:
      operationId: getApprovvigionamento
      tags: [approvvigionamenti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Procurement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approvvigionamento"
    patch:
      operationId: updateApprovvigionamento
      tags: [approvvigionamenti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovvigionamentoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approvvigionamento"

  /approvvigionamenti/{id}/sottometti:
    post:
      operationId: submitApprovvigionamento
      tags: [approvvigionamenti]
      summary: Submit a draft order (sets stato=sottomesso and emails amministrazione)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approvvigionamento"

  /approvvigionamenti/{id}/invia-email:
    post:
      operationId: sendApprovvigionamentoEmail
      tags: [approvvigionamenti]
      summary: Manually (re)send the order email to amministrazione
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSendResult"

  # ─── TURNI (Pianificazione Turni Sociale) ──────────────────────────────────
  /turni:
    get:
      operationId: listTurni
      tags: [turni]
      parameters:
        - name: da
          in: query
          schema:
            type: string
        - name: a
          in: query
          schema:
            type: string
        - name: centroAscoltoId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Turno"
    put:
      operationId: upsertTurno
      tags: [turni]
      summary: Create or replace a shift (centro+data+fascia) and its volunteers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TurnoInput"
      responses:
        "200":
          description: Upserted shift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Turno"

  /turni/volontari-pending:
    post:
      operationId: createTurnoVolontarioPending
      tags: [turni]
      summary: Create a pending volunteer from shift planning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TurnoVolontarioPendingInput"
      responses:
        "201":
          description: Pending volunteer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volontario"

  /turni/mezzi-pending:
    post:
      operationId: createTurnoMezzoPending
      tags: [turni]
      summary: Create a pending vehicle from shift planning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TurnoMezzoPendingInput"
      responses:
        "201":
          description: Pending vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mezzo"

  /turni/{id}:
    delete:
      operationId: deleteTurno
      tags: [turni]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── BENEFICIARI ─────────────────────────────────────────────────────────────
  /beneficiari:
    get:
      operationId: listBeneficiari
      tags: [beneficiari]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: priorita
          in: query
          schema:
            type: string
        - name: domicilio
          in: query
          schema:
            type: boolean
        - name: centroAscoltoId
          in: query
          schema:
            type: integer
        - name: cittaId
          in: query
          schema:
            type: integer
        - name: zonaUdsId
          in: query
          schema:
            type: integer
        - name: uds
          in: query
          schema:
            type: boolean
        - name: attivo
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of beneficiaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Beneficiario"
    post:
      operationId: createBeneficiario
      tags: [beneficiari]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeneficiarioInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Beneficiario"

  /beneficiari/cerca-simili:
    get:
      operationId: cercaBeneficiariSimili
      tags: [beneficiari]
      summary: Fuzzy person-duplicate suggestions within the caller's città
      parameters:
        - name: nome
          in: query
          schema:
            type: string
        - name: cognome
          in: query
          schema:
            type: string
        - name: soprannome
          in: query
          schema:
            type: string
        - name: telefono
          in: query
          schema:
            type: string
        - name: dataNascita
          in: query
          schema:
            type: string
        - name: cittaId
          in: query
          schema:
            type: integer
        - name: excludeId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Possible existing matches ordered by similarity score
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BeneficiarioSimile"

  /beneficiari/bulk:
    post:
      operationId: bulkBeneficiari
      tags: [beneficiari]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeneficiariBulkInput"
      responses:
        "200":
