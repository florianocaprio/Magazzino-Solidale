    post:
      operationId: createUtente
      tags: [utenti]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UtenteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Utente"
        "409":
          description: Username already exists

  /utenti/{id}:
    get:
      operationId: getUtente
      tags: [utenti]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
